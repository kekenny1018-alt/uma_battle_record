<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>賽馬娘戰績記錄小工具</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #f5f5f5;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden; /* 防止背景模糊邊緣溢出產生捲軸 */
            position: relative;
        }
        
        /* 背景圖片與霧化設定 */
        body::before {
            content: "";
            position: absolute;
            /* 往外推一點，避免邊緣模糊漏出白邊 */
            top: -30px; left: -30px; right: -30px; bottom: -30px; 
            background-image: url('5週年.jpg');
            background-size: cover;
            background-position: center;
            /* 霧化效果，並稍微調暗以凸顯前景文字 */
            filter: blur(8px) brightness(0.65); 
            z-index: -1;
        }

        .welcome-panel {
            /* 面板稍微透明，透出模糊背景更具質感 */
            background-color: rgba(37, 37, 48, 0.75); 
            padding: 50px 40px;
            border-radius: 16px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            text-align: center;
            max-width: 500px; /* 稍微加寬以容納兩個按鈕 */
            width: 90%;
            border-top: 6px solid #4CAF50;
            animation: fadeIn 0.8s ease-out;
            backdrop-filter: blur(5px); /* 面板本身再加一點微霧化，加強層次感 */
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            color: #ffeb3b;
            margin-top: 0;
            font-size: 32px;
            margin-bottom: 20px;
            line-height: 1.4;
            text-align: center;
        }

        p {
            color: #e0e0e0;
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 40px;
            text-align: center;
        }

        .btn-group {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .enter-btn {
            background-color: #4CAF50;
            color: white;
            text-decoration: none;
            padding: 16px 30px;
            border-radius: 30px;
            font-size: 20px;
            font-weight: bold;
            transition: all 0.3s ease;
            display: inline-block;
            box-shadow: 0 4px 15px rgba(76, 175, 80, 0.3);
            flex: 1;
            min-width: 120px;
        }

        .enter-btn:hover {
            background-color: #45a049;
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(76, 175, 80, 0.5);
        }

        .enter-btn:active {
            transform: translateY(1px);
        }

        /* LOH 專屬粉色按鈕 */
        .loh-btn {
            background-color: #E91E63;
            box-shadow: 0 4px 15px rgba(233, 30, 99, 0.3);
        }

        .loh-btn:hover {
            background-color: #c2185b;
            box-shadow: 0 8px 25px rgba(233, 30, 99, 0.5);
        }

        .footer-text {
            margin-top: 30px;
            font-size: 12px;
            color: #aaa;
        }
    </style>
</head>
<body>

    <div class="welcome-panel">
        <h1>賽馬娘<br>戰績記錄小工具</h1>
        <p>本工具主要為方便記錄戰績使用，冠軍集會可以記錄戰績並輸出每日戰績圖來發社群，以及生成最終的戰績總結供紀念使用。LOH可以記錄每張票的分數，呈現長條圖及最後的戰績總結供紀念</p>
        
        <!-- 將原本的一個按鈕替換成兩個按鈕的群組 -->
        <div class="btn-group">
            <a href="umamusume.html" class="enter-btn">冠軍集會</a>
            <a href="umaloh.html" class="enter-btn loh-btn">LOH</a>
        </div>
        
        <div class="footer-text">
            v1.0 Professional Edition
        </div>
    </div>

</body>
</html>
