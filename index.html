<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>賽馬娘冠軍集會紀錄器</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a24;
            color: #f5f5f5;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-image: radial-gradient(circle at top right, #2a2a35, #1a1a24);
        }
        .welcome-panel {
            background-color: #252530;
            padding: 50px 40px;
            border-radius: 16px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            text-align: center;
            max-width: 450px;
            width: 90%;
            border-top: 6px solid #4CAF50;
            animation: fadeIn 0.8s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        h1 {
            color: #ffeb3b;
            margin-top: 0;
            font-size: 32px;
            margin-bottom: 15px;
            line-height: 1.3;
        }
        p {
            color: #aaa;
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 40px;
        }
        .enter-btn {
            background-color: #4CAF50;
            color: white;
            text-decoration: none;
            padding: 16px 45px;
            border-radius: 30px;
            font-size: 20px;
            font-weight: bold;
            transition: all 0.3s ease;
            display: inline-block;
            box-shadow: 0 4px 15px rgba(76, 175, 80, 0.3);
        }
        .enter-btn:hover {
            background-color: #45a049;
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(76, 175, 80, 0.5);
        }
        .enter-btn:active {
            transform: translateY(1px);
        }
        .footer-text {
            margin-top: 30px;
            font-size: 12px;
            color: #555;
        }
    </style>
</head>
<body>

    <div class="welcome-panel">
        <h1>🏆 賽馬娘冠軍集會<br>專業紀錄器</h1>
        <p>歡迎來到專為賽馬娘盃賽設計的戰績管理工具。<br>支援 81 場完整紀錄、大數據分析與戰報自動生成功能。</p>
        
        <a href="umamusume.html" class="enter-btn">🚀 進入紀錄器</a>
        
        <div class="footer-text">
            v1.0 Professional Edition
        </div>
    </div>

</body>
</html>
