<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>賽馬娘 LOH 戰績紀錄器</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            color: #f5f5f5; 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            gap: 20px; 
            position: relative;
        }

        /* 滿版霧化背景設定 */
        body::before {
            content: "";
            position: fixed;
            top: -50px; left: -50px; right: -50px; bottom: -50px; 
            background-image: url('5週年.jpg');
            background-size: cover;
            background-position: center;
            filter: blur(25px) brightness(0.4); 
            z-index: -1;
        }

        .main-container { display: flex; gap: 20px; align-items: stretch; flex-wrap: wrap; }
        
        .panel { 
            background-color: rgba(37, 37, 48, 0.85); 
            backdrop-filter: blur(10px);
            padding: 20px; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); 
            box-sizing: border-box; 
        }
        
        .left-panel { flex: 1; min-width: 400px; }
        .right-panel { flex: 1.8; min-width: 500px; display: flex; flex-direction: column; }
        h2, h3 { color: #E91E63; border-bottom: 1px solid #444; padding-bottom: 10px; margin-top: 0; }
        
        .win-rate-panel { display: flex; gap: 20px; margin-bottom: 20px; flex-wrap: wrap; }
        
        .rate-box { 
            flex: 1; min-width: 200px; background: rgba(50, 50, 64, 0.9); 
            border-left: 5px solid #2196F3; padding: 25px 15px; 
            border-radius: 8px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.3); 
            display: flex; flex-direction: column; justify-content: center; 
        }
        .rate-box.total { border-left-color: #E91E63; }
        .rate-label { font-size: 16px; color: #aaa; margin-bottom: 10px; font-weight: bold; }
        .rate-value { font-size: 44px; font-weight: bold; color: #fff; line-height: 1.1; font-family: 'Arial Black', Impact, sans-serif; }

        .stage-title { font-size: 22px; font-weight: bold; color: #ffeb3b; background: rgba(51, 51, 51, 0.9); padding: 10px 15px; border-radius: 8px; text-align: center; margin-bottom: 20px; }
        .lock-status { font-size: 14px; font-weight: normal; padding: 3px 8px; border-radius: 4px; margin-left: 10px; vertical-align: middle; }
        .unlocked { background-color: #E91E63; color: white; }
        .locked { background-color: #757575; color: white; }

        input[type="text"], input[type="number"], select { width: 100%; padding: 10px; border-radius: 5px; border: 1px solid #555; background-color: rgba(51, 51, 51, 0.9); color: white; box-sizing: border-box; font-size: 16px; }
        input[disabled], select[disabled] { background-color: #444; color: #888; cursor: not-allowed; }
        
        .roster-setup { display: flex; gap: 15px; margin-bottom: 10px; align-items: flex-start; flex-wrap: nowrap; overflow-x: auto; padding-bottom: 5px; }
        .preview-avatar-btn { width: 85px; height: 85px; border-radius: 8px; object-fit: cover; background-color: #444; cursor: pointer; border: 2px solid #555; transition: 0.2s; flex-shrink: 0; }
        .preview-avatar-btn:hover { border-color: #E91E63; transform: scale(1.05); }
        
        .roster-input-group { display: flex; flex: 1; gap: 10px; align-items: center; flex-wrap: nowrap; width: 100%; }
        .roster-input-group input[type="text"] { flex: 1; min-width: 300px; max-width: 800px; font-size: 18px; padding: 10px; }
        .roster-input-group button { white-space: nowrap; width: auto; flex-shrink: 0; padding: 10px 20px; font-size: 16px; }
        
        .roster-tag { background: #E91E63; padding: 5px 10px; border-radius: 15px; font-size: 14px; display: inline-flex; align-items: center; gap: 8px; margin: 0 5px 5px 0;}
        .roster-tag img { width: 28px; height: 28px; border-radius: 50%; object-fit: cover; }
        .delete-btn { background: none; border: none; color: white; cursor: pointer; padding: 0; font-size: 16px; font-weight: bold; }
        
        .horse-setup { display: flex; flex-direction: column; gap: 10px; margin-bottom: 15px; background: rgba(50, 50, 64, 0.8); padding: 12px; border-radius: 8px; }
        .horse-input-row { display: flex; flex-direction: row; align-items: center; gap: 15px; }
        .input-display-area { display: flex; flex-direction: row; align-items: center; justify-content: flex-start; gap: 10px; flex: 1; }
        .input-display-area img { width: 65px; height: 65px; border-radius: 8px; object-fit: cover; background-color: #222; flex-shrink: 0; border: 2px solid #E91E63;}
        .input-display-area span { font-size: 18px; font-weight: bold; line-height: 1.3; white-space: nowrap; flex: 1; }

        .score-input-area { background-color: rgba(233, 30, 99, 0.15); padding: 15px; border-radius: 8px; border-left: 5px solid #E91E63; display: flex; align-items: center; gap: 15px; margin-bottom: 15px; }
        .score-input-area label { font-size: 18px; font-weight: bold; color: #fff; white-space: nowrap; }
        .score-input-area input { font-size: 24px; font-weight: bold; font-family: 'Arial Black', sans-serif; color: #FFD700; width: 150px; text-align: center; }

        button { background-color: #E91E63; color: white; border: none; padding: 10px 15px; border-radius: 5px; font-size: 16px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        button:hover { background-color: #c2185b; }
        .action-btns { display: flex; gap: 10px; margin-top: 10px; }
        .action-btns button { flex: 1; }
        .undo-btn { background-color: #757575; }
        .undo-btn:hover { background-color: #616161; }

        /* LOH 專屬橫向戰況表樣式 */
        .grid-table { width: 100%; border-collapse: collapse; background: rgba(50, 50, 64, 0.9); border-radius: 8px; overflow: hidden; table-layout: fixed; }
        .grid-table th, .grid-table td { border: 1px solid #555; text-align: center; vertical-align: middle; word-wrap: break-word; }
        .grid-table th { background-color: #2b2b36; color: #2196F3; font-size: 16px; padding: 10px 5px; }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 100; justify-content: center; align-items: center; }
        .modal-content { background: #252530; padding: 25px; border-radius: 12px; width: 95%; max-width: 1050px; max-height: 85vh; overflow-y: auto; border: 1px solid #E91E63; position: relative; }
        
        .close-modal { position: absolute; right: 15px; top: 15px; background: rgba(0,0,0,0.5); color: #fff; font-size: 24px; cursor: pointer; padding: 0; z-index: 100; width: 40px; height: 40px; border-radius: 50%; border: 1px solid #555; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .close-modal:hover { background: #e53935; border-color: #e53935; }

        .avatar-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 15px; max-height: 55vh; overflow-y: auto; padding-right: 5px; }
        .avatar-picker-wrapper { display: flex; flex-direction: column; align-items: center; gap: 6px; cursor: pointer; padding: 8px; border-radius: 8px; border: 2px solid transparent; transition: 0.2s; background: #323240; }
        .avatar-picker-wrapper:hover { border-color: #E91E63; transform: scale(1.05); }
        .avatar-picker-img { width: 80px; height: 80px; border-radius: 8px; object-fit: cover; background-color: #555; }
        .avatar-picker-name { font-size: 13px; font-weight: bold; text-align: center; line-height: 1.2; color: #fff; }

        /* 圖表外框樣式 */
        .chart-container { background-color: rgba(50, 50, 64, 0.9); padding: 15px; border-radius: 8px; border: 1px solid #555; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }

    </style>
</head>
<body>

    <div class="panel" style="margin-bottom: 20px;">
        <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #444; padding-bottom: 10px; margin-bottom: 15px; flex-wrap: wrap; gap: 10px;">
            <h2 style="margin: 0; border: none; padding: 0;">戰馬登錄</h2>
            <div style="display: flex; align-items: center; gap: 10px;">
                <label style="font-weight: bold; color: #aaa; font-size: 16px; white-space: nowrap;">賽事名稱：</label>
                <input type="text" id="tournament_name" value="LOH 英雄聯盟" placeholder="自訂賽事名稱" style="width: 200px;" onchange="saveData()">
            </div>
        </div>
        <div class="roster-setup">
            <img id="preview_avatar" class="preview-avatar-btn" src="img/unknown.jpg" onclick="openAvatarModal()" title="點擊選擇頭像" onerror="this.src=''; this.style.backgroundColor='#555'">
            <input type="hidden" id="selected_filename" value="unknown.jpg">
            <div style="flex: 1; display: flex; flex-direction: column;">
                <div class="roster-input-group">
                    <input type="text" id="new_horse_name" placeholder="點擊左側頭像選擇馬娘" onkeypress="if(event.key === 'Enter') addToRoster()">
                    <button onclick="addToRoster()">登錄</button>
                </div>
                <div style="font-size: 13px; color: #aaa; margin-top: 8px; margin-left: 4px;">提示：可使用括弧( )做備註</div>
            </div>
        </div>
        <div style="text-align: right; margin-bottom: 15px;">
            <button onclick="clearAllData()" style="background-color: #f44336; padding: 5px 10px; font-size: 14px; width: auto;">格式化全部資料</button>
        </div>
        <div id="roster_display"></div>
    </div>

    <div class="main-container">
        <div class="panel left-panel">
            <div id="stage_display" class="stage-title">載入中...</div>
            <label style="margin-bottom: 10px; display:block;">出賽陣容與分數記錄</label>
            
            <div class="horse-setup">
                <select id="horse_a_select" onchange="onHorseChange('a')"></select>
                <div class="horse-input-row" id="row_a" style="display:none;">
                    <div class="input-display-area">
                        <img id="slot_a_img" src="img/unknown.jpg" onerror="this.src=''; this.style.backgroundColor='#222'">
                        <span id="slot_a_name"></span>
                    </div>
                </div>
            </div>
            
            <div class="horse-setup">
                <select id="horse_b_select" onchange="onHorseChange('b')"></select>
                <div class="horse-input-row" id="row_b" style="display:none;">
                    <div class="input-display-area">
                        <img id="slot_b_img" src="img/unknown.jpg" onerror="this.src=''; this.style.backgroundColor='#222'">
                        <span id="slot_b_name"></span>
                    </div>
                </div>
            </div>
            
            <div class="horse-setup">
                <select id="horse_c_select" onchange="onHorseChange('c')"></select>
                <div class="horse-input-row" id="row_c" style="display:none;">
                    <div class="input-display-area">
                        <img id="slot_c_img" src="img/unknown.jpg" onerror="this.src=''; this.style.backgroundColor='#222'">
                        <span id="slot_c_name"></span>
                    </div>
                </div>
            </div>

            <div class="score-input-area">
                <label>本張票獲得總分：</label>
                <input type="number" id="ticket_score" min="0" max="1000" placeholder="0 ~ 1000" onkeypress="if(event.key === 'Enter') addRecord()">
            </div>

            <input type="text" id="memo" placeholder="備註 (選填)">
            
            <div class="action-btns">
                <button onclick="addRecord()">儲存本場分數</button>
                <button class="undo-btn" onclick="undoLastRecord()">回上一場</button>
            </div>
        </div>

        <div class="panel right-panel">
            <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #444; padding-bottom: 10px; margin-bottom: 20px;">
                <h2 style="margin: 0; border: none; padding: 0;">近 5 張票戰況與總分走勢</h2>
            </div>
            
            <div style="display: flex; gap: 20px; flex-wrap: wrap; margin-bottom: 20px;">
                <div style="flex: 2; min-width: 350px;">
                    <div id="current_round_container"></div>
                </div>
                <div style="flex: 1; min-width: 250px; display: flex; flex-direction: column; gap: 15px;">
                    <div class="rate-box" style="border-left-color: #2196F3;">
                        <div class="rate-label" id="today_label">今日獲得積分 (第1天)</div>
                        <div class="rate-value" id="today_score">0</div>
                    </div>
                    <div class="rate-box total">
                        <div class="rate-label">當前累計總分</div>
                        <div class="rate-value" id="total_score" style="color: #ffeb3b;">4000</div>
                    </div>
                </div>
            </div>

            <div class="chart-container">
                <canvas id="scoreChart" style="width: 100%; max-height: 250px;"></canvas>
            </div>

        </div>
    </div>

    <div id="avatar_modal" class="modal-overlay">
        <div class="modal-content" style="max-width: 850px;">
            <button class="close-modal" onclick="closeModal('avatar_modal')">&times;</button>
            <h2 style="border:none; margin-bottom: 15px; margin-top: 0;">選擇馬娘頭像</h2>
            <input type="text" id="avatar_search" placeholder="輸入關鍵字搜尋馬娘..." onkeyup="filterAvatars()" style="margin-bottom: 15px; font-size: 16px;">
            <div id="avatar_grid" class="avatar-grid"></div>
        </div>
    </div>

    <script>
        // ==========================================
        // 自動化抓取圖片引擎
        // ==========================================
        
        // 【設定區】請填入你的 GitHub 資訊
        const GITHUB_OWNER = 'kekenny1018-alt';  // 例如：'JohnDoe'
        const GITHUB_REPO = 'uma_battle_record';   // 例如：'umamusume-tool'

        // 預設先放一張未知頭像，避免抓取失敗時沒圖可用
        let AVAILABLE_IMAGES = ["unknown.jpg"];

        async function autoLoadImages() {
            try {
                // 透過 GitHub API 自動抓取 img 資料夾內的檔案列表
                const response = await fetch(`https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/img`);
                if (!response.ok) throw new Error('API 請求失敗，請確認帳號/Repo名稱是否正確，以及 Repo 是否為公開狀態。');
                
                const data = await response.json();
                
                // 過濾出 .jpg 和 .png 的檔案，並取出檔名
                const fetchedImages = data
                    .filter(file => file.type === 'file' && file.name.match(/\.(jpg|jpeg|png)$/i))
                    .map(file => file.name);

                // 確保 unknown.jpg 永遠排在第一個，後面接上抓回來的所有圖片
                AVAILABLE_IMAGES = ["unknown.jpg", ...fetchedImages.filter(n => n !== "unknown.jpg")];

                // 圖片清單更新完畢，重新渲染九宮格
                initAvatarGrid();
            } catch (error) {
                console.error("自動抓取圖片失敗:", error);
                // 失敗時退回只顯示一張預設圖，避免網頁崩潰
                initAvatarGrid();
            }
        }

        // 網頁載入時立刻啟動自動抓取引擎
        autoLoadImages();

        let roster = JSON.parse(localStorage.getItem('uma_loh_roster')) || [];
        let records = JSON.parse(localStorage.getItem('uma_loh_records')) || [];
        let scoreChart = null; // 全域變數儲存圖表

        function getBaseName(name) { return name.split('(')[0]; }
        function formatName(name) { return name.replace(/\((.*?)\)/g, '<br>$1'); }

        function initAvatarGrid() {
            const grid = document.getElementById('avatar_grid');
            if (AVAILABLE_IMAGES.length === 0) return;
            
            grid.innerHTML = AVAILABLE_IMAGES.map(filename => {
                const baseName = filename.split('.').slice(0, -1).join('.');
                let isUnknown = filename === "unknown.jpg";
                let displayName = isUnknown ? "請選擇" : formatName(baseName);
                return `
                <div class="avatar-picker-wrapper" data-name="${baseName}" data-is-unknown="${isUnknown}" onclick="selectAvatar('${filename}')">
                    <img src="img/${filename}" class="avatar-picker-img" title="${baseName}" onerror="this.src=''; this.style.backgroundColor='#444'">
                    <span class="avatar-picker-name">${displayName}</span>
                </div>`;
            }).join('');
        }

        function openAvatarModal() {
            document.getElementById('avatar_modal').style.display = 'flex';
            document.getElementById('avatar_search').value = '';
            filterAvatars(); 
            document.getElementById('avatar_search').focus();
        }

        function filterAvatars() {
            const query = document.getElementById('avatar_search').value.toLowerCase();
            const items = document.querySelectorAll('.avatar-picker-wrapper');
            items.forEach(item => {
                const name = item.getAttribute('data-name').toLowerCase();
                if (name.includes(query) || item.getAttribute('data-is-unknown') === "true") item.style.display = 'flex';
                else item.style.display = 'none';
            });
        }

        function selectAvatar(filename) {
            document.getElementById('preview_avatar').src = `img/${filename}`;
            document.getElementById('selected_filename').value = filename;
            if (filename !== "unknown.jpg") {
                document.getElementById('new_horse_name').value = filename.split('.').slice(0, -1).join('.');
            } else {
                document.getElementById('new_horse_name').value = "";
            }
            closeModal('avatar_modal');
        }

        function addToRoster() {
            let name = document.getElementById('new_horse_name').value.trim();
            const imgFile = document.getElementById('selected_filename').value || "unknown.jpg";

            if (imgFile === "unknown.jpg") return alert("請先點擊左側方塊選擇馬娘頭像！");
            if (!name) return alert("請輸入馬娘暱稱！");
            if (roster.find(h => h.name === name)) return alert("這隻馬娘的暱稱已在名冊內！(如需更換圖片請先刪除舊的)");
            
            roster.push({ name, image: imgFile });
            
            document.getElementById('new_horse_name').value = "";
            document.getElementById('selected_filename').value = "unknown.jpg";
            document.getElementById('preview_avatar').src = "img/unknown.jpg";
            saveData(); updateAllUI();
        }

        function deleteFromRoster(name) {
            if(confirm(`確定刪除「${name}」？戰績不會遺失，但無法再被選取。`)) {
                roster = roster.filter(h => h.name !== name);
                saveData(); updateAllUI();
            }
        }

        function updateRosterUI() {
            document.getElementById('roster_display').innerHTML = roster.map(h => {
                const imgSrc = h.image ? `img/${h.image}` : 'img/unknown.jpg';
                return `<span class="roster-tag">
                            <img src="${imgSrc}" onerror="this.src=''; this.style.backgroundColor='#222'"> 
                            <span style="display:inline-block; vertical-align:middle; text-align:center; line-height:1.2;">${formatName(h.name)}</span> 
                            <button class="delete-btn" onclick="deleteFromRoster('${h.name}')">&times;</button>
                        </span>`;
            }).join('');
        }

        function saveData() {
            localStorage.setItem('uma_loh_roster', JSON.stringify(roster));
            localStorage.setItem('uma_loh_records', JSON.stringify(records));
            const tName = document.getElementById('tournament_name');
            if (tName) localStorage.setItem('uma_loh_tournament', tName.value);
        }

        function clearAllData() {
            if(confirm("警告：這會清空所有的 LOH 馬娘與戰績，且無法復原！確定要重置嗎？")) {
                localStorage.removeItem('uma_loh_roster');
                localStorage.removeItem('uma_loh_records');
                location.reload();
            }
        }

        function getStageInfo(global_match) {
            let isLocked = false;
            let canPlay = true;
            let title = "", shortTitle = "";

            if (global_match <= 30) {
                let day = Math.ceil(global_match / 5);
                let match_in_day = (global_match - 1) % 5 + 1;
                shortTitle = `第 ${day} 天`;
                title = `賽程 ${shortTitle} (第 ${match_in_day} 張票)`;
            } else {
                shortTitle = title = "LOH 賽程已全部結束 (共 30 張票)";
                canPlay = false; isLocked = true;
            }
            return { match: global_match, title, shortTitle, isLocked, canPlay, day: Math.ceil(global_match / 5) };
        }

        function updateAllUI() {
            updateRosterUI();
            updateDropdownOptions();
            
            const stage = getStageInfo(records.length + 1);
            const lockTag = stage.isLocked ? `<span class="lock-status locked">鎖定</span>` : (stage.canPlay ? `<span class="lock-status unlocked">可換陣容</span>` : "");
            document.getElementById('stage_display').innerHTML = `${stage.title} ${lockTag}`;

            ['a', 'b', 'c'].forEach((slot, idx) => {
                const select = document.getElementById(`horse_${slot}_select`);
                select.disabled = stage.isLocked || !stage.canPlay;
                if (stage.isLocked && records.length > 0) select.value = records[records.length - 1].lineup[idx].name;
                onHorseChange(slot);
            });
            
            document.getElementById('ticket_score').disabled = stage.isLocked || !stage.canPlay;

            updateScoreBoard();
            updateGridTable();
            initOrUpdateChart();
        }

        function updateHorseSelectDisabledState() {
            const selectedNames = ['a', 'b', 'c'].map(s => document.getElementById(`horse_${s}_select`).value).filter(v => v);
            ['a', 'b', 'c'].forEach(slot => {
                const select = document.getElementById(`horse_${slot}_select`);
                Array.from(select.options).forEach(opt => {
                    if (!opt.value) { opt.disabled = false; return; }
                    const optBase = getBaseName(opt.value);
                    const isSelectedElsewhere = ['a', 'b', 'c'].some(otherSlot => {
                        if (otherSlot === slot) return false;
                        const otherVal = document.getElementById(`horse_${otherSlot}_select`).value;
                        return otherVal && getBaseName(otherVal) === optBase;
                    });
                    opt.disabled = isSelectedElsewhere;
                });
            });
        }

        function updateDropdownOptions() {
            ['a', 'b', 'c'].forEach(slot => {
                const select = document.getElementById(`horse_${slot}_select`);
                const val = select.value;
                select.innerHTML = `<option value="">-- 請選擇出賽馬娘 --</option>` + roster.map(h => `<option value="${h.name}">${h.name}</option>`).join('');
                if (roster.find(h => h.name === val)) select.value = val;
            });
            updateHorseSelectDisabledState();
        }

        function onHorseChange(slot) {
            const name = document.getElementById(`horse_${slot}_select`).value;
            const rowWrapper = document.getElementById(`row_${slot}`);
            const imgEl = document.getElementById(`slot_${slot}_img`);
            const nameEl = document.getElementById(`slot_${slot}_name`);
            const stage = getStageInfo(records.length + 1);

            if (!name || !stage.canPlay) { 
                rowWrapper.style.display = "none";
            } else {
                const horse = roster.find(h => h.name === name);
                rowWrapper.style.display = "flex"; imgEl.style.display = "block"; nameEl.style.display = "flex";
                const imgSrc = horse.image && horse.image !== "unknown.jpg" ? `img/${horse.image}` : 'img/unknown.jpg';
                imgEl.src = imgSrc;
                nameEl.style.color = '#f5f5f5'; nameEl.innerHTML = formatName(horse.name);
            }
            updateHorseSelectDisabledState();
        }

        function addRecord() {
            const stageInfo = getStageInfo(records.length + 1);
            if (!stageInfo.canPlay) return alert("LOH 30 張票已全部打完！");
            
            const lineup = []; 
            for (const slot of ['a', 'b', 'c']) {
                const name = document.getElementById(`horse_${slot}_select`).value;
                if (!name) return alert("陣容未填滿，請選擇三隻馬娘！");
                const horse = roster.find(h => h.name === name) || {name, image: "unknown.jpg"};
                lineup.push({ name, image: horse.image });
            }

            const baseNames = lineup.map(h => getBaseName(h.name));
            if (new Set(baseNames).size !== baseNames.length) return alert("陣容衝突！不能同時派出同一位馬娘的不同換裝！");

            const scoreInput = document.getElementById('ticket_score').value;
            if (scoreInput === "" || scoreInput < 0 || scoreInput > 1000) return alert("請輸入正確的分數 (0 ~ 1000)。");

            records.push({ 
                match_id: stageInfo.match, 
                day: stageInfo.day,
                lineup, 
                score: parseInt(scoreInput, 10),
                memo: document.getElementById('memo').value 
            });
            
            document.getElementById('ticket_score').value = "";
            document.getElementById('memo').value = "";
            saveData(); updateAllUI();
        }

        function undoLastRecord() {
            if (records.length === 0) return alert("無紀錄可復原。");
            if (confirm("確定刪除上一張票的紀錄嗎？")) {
                records.pop();
                saveData(); updateAllUI();
            }
        }

        function updateScoreBoard() {
            const baseScore = 4000;
            let totalAddedScore = 0;
            let currentDayScore = 0;
            
            let currentDay = records.length > 0 ? records[records.length - 1].day : 1;
            if(records.length === 30) currentDay = 6;

            records.forEach(r => {
                totalAddedScore += r.score;
                if (r.day === currentDay) {
                    currentDayScore += r.score;
                }
            });

            document.getElementById('today_label').innerText = `今日獲得積分 (第 ${currentDay} 天)`;
            document.getElementById('today_score').innerText = currentDayScore;
            document.getElementById('total_score').innerText = baseScore + totalAddedScore;
        }

        function buildLOHListHTML(chunkArray) {
            if (chunkArray.length === 0) return "<p style='color:#888'>尚無紀錄。</p>";
            
            const latestLineup = chunkArray[chunkArray.length - 1].lineup;
            let avatarsHtml = `<div style="display: flex; justify-content: center; gap: 25px; margin-bottom: 20px;">`;
            latestLineup.forEach(h => {
                const imgSrc = h.image !== "unknown.jpg" ? `img/${h.image}` : "img/unknown.jpg";
                avatarsHtml += `<img src="${imgSrc}" title="${h.name}" style="width: 75px; height: 75px; border-radius: 12px; object-fit: cover; border: 3px solid #E91E63; background-color: #222; box-shadow: 0 4px 10px rgba(0,0,0,0.5);">`;
            });
            avatarsHtml += `</div>`;

            let cols = 5;
            let ths = "";
            let scoreTds = "";
            let memoTds = "";
            const hasMemo = chunkArray.some(match => match.memo && match.memo.trim() !== "");

            for(let j=0; j<cols; j++) {
                if (j < chunkArray.length) {
                    const r = chunkArray[j];
                    ths += `<th>票 ${r.match_id}</th>`;
                    scoreTds += `<td style="font-size: 36px; font-weight: 900; color: #FFD700; padding: 15px 5px; font-family: 'Arial Black', Impact, sans-serif;">${r.score}</td>`;
                    if (hasMemo) memoTds += `<td style="color: #aaa; font-size: 14px; padding: 8px; background-color: rgba(42, 42, 53, 0.9);">${r.memo || ""}</td>`;
                } else {
                    ths += `<th>-</th>`;
                    scoreTds += `<td style="color: #555; font-size: 24px; padding: 15px 5px;">-</td>`;
                    if (hasMemo) memoTds += `<td style="background-color: rgba(42, 42, 53, 0.9);"></td>`;
                }
            }

            let html = avatarsHtml + `
                <table class="grid-table" style="width: 100%; table-layout: fixed;">
                    <tr>${ths}</tr>
                    <tr>${scoreTds}</tr>
                    ${hasMemo ? `<tr>${memoTds}</tr>` : ""}
                </table>
            `;
            return html;
        }

        function updateGridTable() {
            const container = document.getElementById('current_round_container');
            if (records.length === 0) {
                container.innerHTML = "<p style='color:#888'>尚無紀錄，請輸入您的第一張票分數。</p>";
                return;
            }
            const recentRecords = records.slice(-5); 
            container.innerHTML = buildLOHListHTML(recentRecords);
        }

        // --- 初始化或更新 Chart.js 折線圖 ---
        function initOrUpdateChart() {
            const ctx = document.getElementById('scoreChart').getContext('2d');
            
            let dataPoints = [{x: 0, y: 4000}];
            let currentScore = 4000;
            for (let i = 0; i < records.length; i++) {
                currentScore += records[i].score;
                dataPoints.push({x: i + 1, y: currentScore});
            }

            if (scoreChart) {
                scoreChart.data.datasets[0].data = dataPoints;
                scoreChart.update();
            } else {
                scoreChart = new Chart(ctx, {
                    type: 'line',
                    data: {
                        datasets: [{
                            label: '累計分數走勢',
                            data: dataPoints,
                            borderColor: '#FFD700',
                            backgroundColor: 'rgba(255, 215, 0, 0.2)',
                            borderWidth: 2,
                            pointBackgroundColor: '#fff',
                            pointBorderColor: '#FFD700',
                            pointRadius: 4,
                            pointHoverRadius: 6,
                            fill: true,
                            tension: 0.1
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { display: false },
                            tooltip: {
                                callbacks: {
                                    title: function(context) {
                                        return context[0].raw.x === 0 ? '初始分數' : '票 ' + context[0].raw.x;
                                    },
                                    label: function(context) {
                                        return '分數: ' + context.raw.y;
                                    }
                                }
                            }
                        },
                        scales: {
                            x: {
                                type: 'linear',
                                min: 0,
                                max: 30,
                                ticks: {
                                    stepSize: 5,
                                    color: '#aaa',
                                    font: { size: 14 }
                                },
                                grid: { color: '#444' },
                                title: {
                                    display: true,
                                    text: '消耗票數',
                                    color: '#aaa',
                                    font: { size: 12 }
                                }
                            },
                            y: {
                                min: 4000,
                                max: 34000,
                                ticks: {
                                    color: '#aaa',
                                    font: { size: 14 }
                                },
                                grid: { color: '#444' }
                            }
                        }
                    }
                });
            }
        }

        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        window.onclick = function(e) { if (e.target.classList.contains('modal-overlay')) e.target.style.display = "none"; }

        const savedTName = localStorage.getItem('uma_loh_tournament');
        if (savedTName) {
            const tNameInput = document.getElementById('tournament_name');
            if (tNameInput) tNameInput.value = savedTName;
        }

        initAvatarGrid();
        updateAllUI();
    </script>
</body>
</html>
